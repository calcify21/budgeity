name: Deploy to Hostinger

on:
  push:
    branches:
      - main # Only deploy when you push to the main branch

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24" # Use a modern node version for building

      - name: Install Dependencies
        run: npm install

      - name: Build Project
        run: npm run build

      - name: FTP Deploy to Hostinger
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./dist/ # This uploads the BUILT app, not the source code
          server-dir: /budgeity/ # Deploys to your subfolder
